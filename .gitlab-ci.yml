stages:
  - build
  - push
  - deploy

build_job_frontend:
   stage: build
   script:
      - docker build -t taskmanagerfrontend:latest ./AI-TaskManager Frontend/TaskManager
   tags:
      - dev

build_job_backend:
   stage: build
   script:
      - docker build -t taskmanagerbackend:latest ./AI-TaskManager Backend
   tags:
      - dev

push_frontend:
   stage: push
   script: 
      - docker login -u $DOCKERHUB_USER -p $DOCKERHUB_PASS
      - docker image tag taskmanagerfrontend:latest $DOCKERHUB_USER/taskmanagerfrontend:latest
      - docker push $DOCKERHUB_USER/taskmanagerfrontend:latest
   tags:
     - dev

push_backend:
   stage: push
   script: 
      - docker login -u $DOCKERHUB_USER -p $DOCKERHUB_PASS
      - docker image tag taskmanagerbackend:latest $DOCKERHUB_USER/taskmanagerbackend:latest
      - docker push $DOCKERHUB_USER/taskmanagerbackend:latest
   tags:
     - dev     


deploy_job:
    stage: deploy
    script:
        - docker compose down
        - docker compose up -d --build
    tags:
        - dev